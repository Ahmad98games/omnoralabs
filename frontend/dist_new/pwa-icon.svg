<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background for maskable icon -->
  <rect width="512" height="512" rx="0" fill="#0A0A0A"/>
  
  <!-- Subtle Gradients -->
  <defs>
    <linearGradient id="omGradient" x1="150" y1="150" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="256" r="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Ambient background glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" opacity="0.5"/>

  <!-- Logo Arcs -->
  <path d="M120 256C120 180.891 180.891 120 256 120" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <path d="M140 256C140 191.939 191.939 140 256 140" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <path d="M165 256C165 205.743 205.743 165 256 165" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Main "OM" Text Replacement with Paths for high fidelity -->
  <!-- "O" -->
  <circle cx="185" cy="256" r="65" stroke="url(#omGradient)" stroke-width="28"/>
  
  <!-- "M" -->
  <path d="M280 321V191L330 256L380 191V321" stroke="url(#omGradient)" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Lower Brand Text -->
  <text x="256" y="420" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="900" font-size="34" letter-spacing="4">OMNORA LABS</text>
</svg>
